<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Phone Destroyer</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: #fff;
}
.container { max-width: 1200px; margin: auto; padding: 20px; }
.header { text-align: center; padding: 30px 0; }

.logo {
    font-size: 3rem;
    font-weight: bold;
    background: linear-gradient(45deg, #ff0066, #ff6600);
    -webkit-background-clip: text;
    color: transparent;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin: 30px 0;
}

.stat-card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    text-align: center;
    border-radius: 15px;
}

.attack-form {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 20px;
}

input, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
}

button {
    background: linear-gradient(45deg, #ff0066, #ff6600);
    color: white;
    cursor: pointer;
}

.logout-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    background: #ff4757;
    padding: 10px;
    text-decoration: none;
    color: white;
}

.response-area {
    margin-top: 20px;
    background: rgba(0,0,0,0.5);
    padding: 15px;
    max-height: 300px;
    overflow-y: auto;
    font-family: monospace;
}
</style>
</head>

<body>

<a href="/logout" class="logout-btn">🚪 Logout</a>

<div class="container">

<div class="header">
    <div class="logo">💀 PHONE DESTROYER PRO 💀</div>
    <div style="margin-top:10px;">Welcome, User</div>
</div>

<div class="stats-grid">
    <div class="stat-card">📡 TOTAL APIS<div id="totalApis">0</div></div>
    <div class="stat-card">💣 ACTIVE ATTACKS<div id="activeAttacks">0</div></div>
    <div class="stat-card">✅ SUCCESS HITS<div id="totalHits">0</div></div>
    <div class="stat-card">⏱️ UPTIME<div id="uptime">0</div></div>
</div>

<div class="attack-form">

<input id="singlePhone" placeholder="Enter 10-digit phone number">
<input id="multiPhones" placeholder="Comma separated numbers">

<button onclick="attackSingle()">🔥 ATTACK SINGLE</button>
<button onclick="attackMultiple()">💣 ATTACK MULTIPLE</button>
<button onclick="stopAll()">🛑 STOP ALL</button>
<button onclick="getStatus()">📊 GET STATUS</button>

</div>

<div class="response-area" id="responseArea"></div>

</div>

<script>

function log(msg,type="info"){
    const area = document.getElementById('responseArea');
    const div = document.createElement('div');
    div.innerText = "["+new Date().toLocaleTimeString()+"] "+msg;
    area.prepend(div);
}

function updateStats(){
    fetch('/api/stats')
    .then(r => r.json().catch(()=>({})))
    .then(d=>{
        document.getElementById('totalApis').innerText = d.totalApis || 0;
        document.getElementById('activeAttacks').innerText = d.activeAttacks || 0;
        document.getElementById('totalHits').innerText = d.totalHits || 0;
        document.getElementById('uptime').innerText = d.uptime || 0;
    })
    .catch(()=>log("Stats error"));
}

function attackSingle(){
    let phone = document.getElementById('singlePhone').value;

    if(!phone){
        log("Enter phone number");
        return;
    }

    log("Starting attack on "+phone);

    fetch('/api/bomb',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({phone: phone})
    })
    .then(r=>r.json())
    .then(d=>log("Response: "+JSON.stringify(d)))
    .catch(()=>log("Error"));
}

function attackMultiple(){
    let phones = document.getElementById('multiPhones').value;

    if(!phones){
        log("Enter numbers");
        return;
    }

    log("Starting multi attack");

    fetch('/api/multibomb',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({phones: phones})
    })
    .then(r=>r.json())
    .then(d=>log("Response: "+JSON.stringify(d)))
    .catch(()=>log("Error"));
}

function stopAll(){
    log("Stopping all...");

    fetch('/api/stopall',{method:'POST'})
    .then(r=>r.json())
    .then(d=>log("Stopped"))
    .catch(()=>log("Error"));
}

function getStatus(){
    fetch('/api/status')
    .then(r=>r.json())
    .then(d=>log("Status: "+JSON.stringify(d)))
    .catch(()=>log("Error"));
}

setInterval(updateStats,5000);
updateStats();

</script>

</body>
</html>
