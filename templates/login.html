<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Phone Destroyer Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff0066, #ff6600);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(45deg, #ff0066, #ff6600);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        .error { color: #ff4757; margin-top: 15px; }
        .info { margin-top: 20px; color: rgba(255,255,255,0.6); }
        .password { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">💀 PHONE DESTROYER</div>
        <form method="POST">
            <input type="text" name="username" placeholder="Your Name (any)" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">🔓 ACCESS SYSTEM</button>
        </form>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <div class="info">🔐 Password: <span class="password">aniket</span></div>
    </div>
</body>
</html>
